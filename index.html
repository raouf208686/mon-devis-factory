<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CakeProDz</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #fff1f5;       
            --card: #ffffff;     
            --text: #5e1c3e;     
            --accent: #5e1c3e;   
            --border: #f8e1e7;   
            --gold-accent: #c5a059; 
            --input-text: #5e1c3e;
        }

        [data-theme="dark"] {
            --bg: #2a0a1a;       
            --card: #3a1a2a;     
            --text: #fff1f5;     
            --accent: #ffb6c1;   
            --border: #5e1c3e;   
            --gold-accent: #ffcc66; 
            --input-text: #ffffff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text); 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            transition: 0.3s;
            min-height: 100vh;
        }

        .app { width: 100%; max-width: 480px; position: relative; z-index: 1; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 32px; margin: 0; color: var(--text); font-weight: 700; text-transform: uppercase; }
        .darja { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; display: block;}

        .section { background: var(--card); border: 1px solid var(--border); padding: 22px; border-radius: 25px; margin-bottom: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 18px; display: block; }

        .card { padding: 20px; border-radius: 18px; background: rgba(94, 28, 62, 0.03); margin-bottom: 12px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; color: var(--text); }
        .card.selected { border: 2px solid var(--accent); background: var(--accent); color: #ffffff !important; transform: scale(1.02); }
        .card.selected * { color: #ffffff !important; } 
        
        .price-badge { background: var(--gold-accent); color: #1a040a !important; padding: 5px 10px; border-radius: 10px; font-size: 11px; font-weight: 800; }

        .total-box { background: var(--accent); color: var(--gold-accent) !important; padding: 30px; border-radius: 35px; text-align: center; margin-top: 25px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); }
        .total-box span, .total-box small { color: var(--gold-accent) !important; }

        input, textarea { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            background: var(--card); 
            color: var(--input-text); 
            box-sizing: border-box; 
            font-family: inherit; 
            margin-top: 8px; 
            outline: none; 
        }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 12px; margin-top: 10px; transition: 0.3s; display: block; text-decoration: none; text-align: center; }
        .btn-wa { background: #25D366; color: white; }
        .btn-ig { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: white; }
        .btn-top { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 10px 18px; border-radius: 14px; font-size: 11px; font-weight: 700; cursor: pointer; }

        .admin-panel { display: none; background: var(--card); padding: 20px; border-radius: 25px; border: 2px solid var(--accent); margin-bottom: 20px; }
        .admin-block { background: rgba(94, 28, 62, 0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 10px; margin-top: 10px; width: 100%; }

        .note-chef { border-left: 4px solid var(--accent); padding: 15px; font-size: 13px; background: var(--card); margin-bottom: 20px; font-style: italic; border-radius: 0 15px 15px 0; color: var(--text); opacity: 0.9; }
    </style>
</head>
<body>

<div class="app">
    <div style="display:flex; justify-content: space-between; margin-bottom: 25px;">
        <button class="btn-top" onclick="toggleTheme()">🌓 </button>
        <button class="btn-top" onclick="toggleAdmin()">⚙️ </button>
    </div>

    <div id="admin" class="admin-panel">
        <h3 style="margin:0 0 15px 0; color:var(--text)">Cake Devis</h3>
        <input type="text" id="a_name" placeholder="Nom Boutique" oninput="upd()">
        <input type="text" id="a_wa" placeholder="WhatsApp (213...)" oninput="upd()">
        <input type="text" id="a_ig" placeholder="Instagram (sans @)" oninput="upd()">
        <input type="number" id="a_base" placeholder="Prix base/part" oninput="upd()">
        <textarea id="a_msg" placeholder="Message d'accueil" oninput="upd()"></textarea>
        <textarea id="a_rem" placeholder="Note bas de page" oninput="upd()"></textarea>

        <p class="section-title" style="margin-top:20px">Mes Saveurs</p>
        <div id="adm_flavors"></div>
        <button class="btn" style="background:var(--accent); color:white" onclick="add('f')">+ Ajouter une Saveur</button>

        <p class="section-title" style="margin-top:20px">Mes Suppléments</p>
        <div id="adm_extras"></div>
        <button class="btn" style="background:var(--accent); color:white" onclick="add('e')">+ Ajouter un Supplément</button>

        <button class="btn" style="background:var(--gold-accent); color:#1a040a; margin-top:30px" onclick="copyLink()">🔗 CRÉER LE LIEN CLIENT</button>
    </div>

    <div class="header">
        <h1 id="v_name">...</h1>
        <span class="darja">Cake Pro</span>
        <p id="v_msg" style="font-size:13px; opacity:0.8; margin-top:15px; padding: 0 20px;"></p>
    </div>

    <div class="section">
        <span class="section-title">📏 Dimensions</span>
        <div style="display:flex; gap:12px">
            <div style="flex:1"><small>Parts</small><input type="number" id="parts" value="10" oninput="calc()"></div>
            <div style="flex:1"><small>Étages</small><input type="number" id="etages" value="1" oninput="calc()"></div>
        </div>
        <input type="date" id="date" style="margin-top:12px">
    </div>

    <div class="section">
        <span class="section-title">👑 Univers de Saveurs</span>
        <div id="list_f"></div>
    </div>

    <div class="section">
        <span class="section-title">✨ Design & Extras</span>
        <div id="list_e"></div>
    </div>

    <div id="v_rem" class="note-chef"></div>

    <div class="section">
        <span class="section-title">📝 Note Personnalisée</span>
        <textarea id="note" placeholder="Thème, prénom, couleurs, détails particuliers..."></textarea>
    </div>

    <div class="total-box">
        <small>ESTIMATION TOTALE</small>
        <div style="font-size:42px; font-weight:800; margin:10px 0;"><span id="total">0</span> <small style="font-size:16px">DA</small></div>
        <button class="btn btn-wa" onclick="send('wa')">Commander via WhatsApp</button>
        <button class="btn btn-ig" onclick="send('ig')">Commander via Instagram</button>
    </div>

    <div style="text-align:center; margin-top:35px; font-size:10px; letter-spacing:3px; opacity:0.4; color:var(--text)">DESIGNED BY RAOUF STUDIO</div>
</div>

<script>
    let db = {
        n: "MA BOUTIQUE", w: "213", i: "Ma_Boutique", b: 300, m: "Fait avec amour pour vos moments spéciaux.", r: "Tarifs sujets à modification selon le design.",
        f: [
            {n: "👑 Signature Pistache", d: "Crème pure pistache & éclats", p: 400, s: true},
            {n: "🍫 Royal Chocolat", d: "Ganache 65% & praliné", p: 300, s: false}
        ],
        e: [
            {n: "Fleurs Fraîches", p: 2000, s: false},
            {n: "Feuilles d'Or", p: 900, s: false}
        ]
    };

    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('data')) {
        try { db = JSON.parse(atob(urlParams.get('data'))); } catch(e) { console.log("Lien erroné"); }
    } else {
        const saved = localStorage.getItem('cakepro_v3');
        if(saved) db = JSON.parse(saved);
    }

    // Fonction de rendu principal (ne pas appeler pendant l'input admin)
    function renderApp() {
        document.getElementById('v_name').innerText = db.n;
        document.getElementById('v_msg').innerText = db.m;
        document.getElementById('v_rem').innerText = db.r;

        const lf = document.getElementById('list_f'); lf.innerHTML = '';
        db.f.forEach((x, i) => {
            lf.innerHTML += `<div class="card ${x.s?'selected':''}" onclick="sel('f',${i})">
                <div style="display:flex; justify-content:space-between; align-items:center;"><b>${x.n}</b><span class="price-badge">${(parseInt(db.b)+parseInt(x.p))} DA/P</span></div>
                ${x.d ? `<div style="font-size:11px; opacity:0.8; margin-top:8px;">${x.d}</div>` : ''}</div>`;
        });

        const le = document.getElementById('list_e'); le.innerHTML = '';
        db.e.forEach((x, i) => {
            le.innerHTML += `<div class="card ${x.s?'selected':''}" onclick="sel('e',${i})">
                <div style="display:flex; justify-content:space-between"><span>${x.n} ${x.s?'✓':''}</span><b>+${x.p} DA</b></div></div>`;
        });
        calc();
    }

    // Rendu spécifique de l'admin pour éviter les bugs de clavier
    function renderAdmin() {
        document.getElementById('a_name').value = db.n;
        document.getElementById('a_wa').value = db.w;
        document.getElementById('a_ig').value = db.i;
        document.getElementById('a_base').value = db.b;
        document.getElementById('a_msg').value = db.m;
        document.getElementById('a_rem').value = db.r;

        const af = document.getElementById('adm_flavors'); af.innerHTML = '';
        db.f.forEach((x, i) => {
            af.innerHTML += `<div class="admin-block">
                <input type="text" value="${x.n}" oninput="db.f[${i}].n=this.value; save(); renderApp()" placeholder="Nom">
                <input type="text" value="${x.d}" oninput="db.f[${i}].d=this.value; save(); renderApp()" placeholder="Description">
                <input type="number" value="${x.p}" oninput="db.f[${i}].p=this.value; save(); renderApp()" placeholder="Supplément">
                <button class="btn-del" onclick="del('f',${i})">Supprimer Saveur</button>
            </div>`;
        });

        const ae = document.getElementById('adm_extras'); ae.innerHTML = '';
        db.e.forEach((x, i) => {
            ae.innerHTML += `<div class="admin-block">
                <input type="text" value="${x.n}" oninput="db.e[${i}].n=this.value; save(); renderApp()" placeholder="Nom">
                <input type="number" value="${x.p}" oninput="db.e[${i}].p=this.value; save(); renderApp()" placeholder="Prix fixe">
                <button class="btn-del" onclick="del('e',${i})">Supprimer Extra</button>
            </div>`;
        });
    }

    function sel(t, i) { if(t==='f') db.f.forEach((x,idx)=>x.s=(idx===i)); else db.e[i].s=!db.e[i].s; save(); renderApp(); }
    
    function del(t, i) { db[t].splice(i,1); save(); renderApp(); renderAdmin(); }
    
    function add(t) { 
        if(t==='f') db.f.push({n:"Nouvelle Saveur", d:"", p:0, s:false}); 
        else db.e.push({n:"Nouvel Extra", p:0, s:false}); 
        save(); renderApp(); renderAdmin(); 
    }

    function upd() { 
        db.n = document.getElementById('a_name').value; 
        db.w = document.getElementById('a_wa').value; 
        db.i = document.getElementById('a_ig').value.replace('@',''); 
        db.b = document.getElementById('a_base').value; 
        db.m = document.getElementById('a_msg').value; 
        db.r = document.getElementById('a_rem').value; 
        save(); 
        document.getElementById('v_name').innerText = db.n;
        document.getElementById('v_msg').innerText = db.m;
        document.getElementById('v_rem').innerText = db.r;
        calc();
    }

    function calc() {
        const p = parseInt(document.getElementById('parts').value)||0;
        const et = parseInt(document.getElementById('etages').value)||1;
        const f = db.f.find(x=>x.s)||{p:0};
        let t = p * (parseInt(db.b)+parseInt(f.p));
        db.e.forEach(x=>{if(x.s) t+=parseInt(x.p)});
        if(et>1) t+=(et-1)*1500;
        document.getElementById('total').innerText = t.toLocaleString('fr-FR');
    }

    function send(mode) {
        const d = document.getElementById('date').value; if(!d) return alert("Veuillez choisir une date !");
        const f = db.f.find(x=>x.s);
        const ex = db.e.filter(x=>x.s).map(x=>x.n);
        const note = document.getElementById('note').value;
        const txt = `*DEVIS ${db.n}*\n📅 Date: ${d}\n📏 ${document.getElementById('parts').value} parts (${document.getElementById('etages').value} ét.)\n👑 Saveur: ${f.n}\n✨ Extras: ${ex.join(', ') || 'Aucun'}\n📝 Note: ${note || 'Aucune'}\n💰 TOTAL: ${document.getElementById('total').innerText} DA`;
        
        if(mode==='wa') {
            window.open(`https://wa.me/${db.w}?text=${encodeURIComponent(txt)}`);
        } else {
            navigator.clipboard.writeText(txt).then(() => {
                alert("Devis copié ! Collez-le sur Instagram.");
                window.open(`https://instagram.com/${db.i}/`);
            });
        }
    }

    function copyLink() {
        const dataStr = btoa(unescape(encodeURIComponent(JSON.stringify(db))));
        const link = window.location.origin + window.location.pathname + "?data=" + dataStr;
        navigator.clipboard.writeText(link); alert("LIEN CLIENT PRÊT !");
    }

    function toggleAdmin() { 
        const p = document.getElementById('admin');
        if(p.style.display === 'block') {
            p.style.display = 'none';
        } else {
            if(prompt("Code Atelier:") === "0228") {
                renderAdmin();
                p.style.display = 'block';
            }
        }
    }
    
    function save() { localStorage.setItem('cakepro_v3', JSON.stringify(db)); }
    function toggleTheme() { document.body.dataset.theme = (document.body.dataset.theme==='dark')?'':'dark'; }
    
    window.onload = renderApp;
</script>

</body>
</html>
